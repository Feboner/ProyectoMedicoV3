spring.application.name=ms-pedidos
server.port=8087
spring.datasource.url=jdbc:mysql://db-pedidos:3306/db_medico_pedidos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
logging.level.root=INFO
logging.level.com.medico=DEBUG

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Make Swagger UI load the spec via the gateway
springdoc.swagger-ui.url=/api/v1/pedidos/v3/api-docs
app.gateway.base-url=${APP_GATEWAY_BASE_URL:http://localhost:8080}


spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/